<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン - MatsuriOps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f9fafb;
      color: #374151;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #111827;
    }

    p {
      color: #6b7280;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .retry-button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #f97316;
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .retry-button:hover {
      background-color: #ea580c;
    }

    .tips {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #fff;
      border-radius: 0.5rem;
      border: 1px solid #e5e7eb;
      text-align: left;
    }

    .tips h2 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #374151;
    }

    .tips ul {
      font-size: 0.875rem;
      color: #6b7280;
      padding-left: 1.25rem;
    }

    .tips li {
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>オフラインです</h1>
    <p>インターネット接続がありません。接続を確認して再度お試しください。</p>
    <a href="/" class="retry-button" onclick="window.location.reload(); return false;">
      再試行
    </a>

    <div class="tips">
      <h2>💡 ヒント</h2>
      <ul>
        <li>Wi-Fiまたはモバイルデータを確認してください</li>
        <li>機内モードがオフになっているか確認してください</li>
        <li>ルーターを再起動してみてください</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
