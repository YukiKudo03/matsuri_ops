services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: matsuri_ops_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/matsuri_ops_dev
      PHX_HOST: localhost
      SECRET_KEY_BASE: development_secret_key_base_at_least_64_bytes_long_for_security
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
      - node_modules:/app/assets/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: mix phx.server

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      MIX_ENV: test
      DATABASE_HOST: db
    volumes:
      - .:/app
      - test_deps:/app/deps
      - test_build:/app/_build
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test
    command: mix test test/features/ --trace

volumes:
  postgres_data:
  deps:
  build:
  node_modules:
  test_deps:
  test_build:
